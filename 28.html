<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn1">Generate odd numbers from 1-100</button>
    <script>
        btn1.onclick=function odd(){
            for(let i=1;i<=100;i++){
                if(i%2!==0){
                    document.write(i+" ");
                }
            }
        }
    </script>
</body>
</html>
