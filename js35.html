<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<label>Number</label>
<input id="n">

<button id="btn">Calculate square and cube</button>

<p id="s"></p>

<script>
btn.onclick=function(){

    let n=parseFloat(document.getElementById("n").value);

    s.textContent=
    "Square="+(n*n)+
    " Cube="+(n*n*n);
}
</script>

</body>
</html>
