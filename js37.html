<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<label>Enter a Number</label>
<input id="n">

<button id="btn">Find All Factors of this number</button>

<p id="s"></p>

<script>
btn.onclick=function(){

    let n=parseInt(document.getElementById("n").value);

    let out="";

    for(let i=1;i<=n;i++){
        if(n%i==0){
            out+=i+" ";
        }
    }

    s.textContent=out;
}
</script>

</body>
</html>
