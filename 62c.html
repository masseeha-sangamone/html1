<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Using JS</title>
</head>
<body>

    <script>

        let months = [
            ["Jan 2026",31],/**months[i][0] here is jan**/
            ["Feb 2026",28],
            ["Mar 2026",31],
            ["Apr 2026",30],
            ["May 2026",31],
            ["Jun 2026",30],
            ["Jul 2026",31],
            ["Aug 2026",31],
            ["Sep 2026",30],
            ["Oct 2026",31],
            ["Nov 2026",30],
            ["Dec 2026",31]
        ];
        for(let i=0;i<months.length;i++){
            document.write("<h2>"+months[i][0]+"<br>");
                for(let j=1;j<=months[i][1];j++){
                    document.write(j+"<br>");
                }
        }

    </script>
</body>
</html>
