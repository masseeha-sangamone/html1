<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
</head>
<body>

    <h1 id="timer"></h1>
    <script>
        let count = 10;

        document.getElementById("timer").innerHTML = count;

        let timer = setInterval(function () {
            count--;
            document.getElementById("timer").innerHTML = count;
            if(count == 0){
                clearInterval(timer);
            }
        },1000);

    </script>
</body>
</html>
