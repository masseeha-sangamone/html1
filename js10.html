<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armstrong numbers</title>
</head>
<body>
    <button id="btn1">Generate Armstrong numbers between 1-1000</button>
    <p id="p1"></p>
    <script>
        let btn1=document.getElementById("btn1");
        btn1.onclick=function(){
for(let num = 1; num <= 1000; num++){

    let temp = num;
    let count = 0;
    let sum = 0;
    while(temp > 0){
        count++;
        temp = Math.floor(temp / 10);
    }
    temp = num;
    while(temp > 0){

        let digit = temp % 10;
        let power = 1;

        for(let i = 1; i <= count; i++){
            power = power * digit;
        }
        sum = sum + power;
        temp = Math.floor(temp / 10);
    }
    
    if(sum == num){
        p1.textContent+=" "+num;
    }
}
}
</script>
</body>
</html>
