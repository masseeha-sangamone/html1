<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<button id="btn">Print all factors from 100-200</button>

<p id="s"></p>

<script>
btn.onclick=function(){

    let result="";

    for(let n=100;n<=200;n++){

        result+=n+": ";

        for(let i=1;i<=n;i++){
            if(n%i==0){
                result+=i+" ";
            }
        }

        result+="<br>";
    }

    s.innerHTML=result;
}
</script>

</body>
</html>
