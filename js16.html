<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=prompt("Enter a number");
        function evenorodd(){
            if (num%2==0){
                alert("It is an even number");
            }
            else{
                alert("It is an odd number");
            }
        }
        evenorodd();
    </script>
</body>
</html>
