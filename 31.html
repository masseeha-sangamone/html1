    <!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest of 3 numbers</title>
</head>
<body>
    <label for="num1">Enter the first number</label>
    <input type="text" id="num1">
    <br>
    <label for="num2">Enter the second number</label>
    <input type="text" id="num2">
    <br>
    <label for="num3">Enter the third number</label>
    <input type="text" id="num3">
    <br>
    <button id="btn">Which is the largest amongst these?</button>
    <br>
    <span id="s1"></span>
    <script>
        function largestamong3(num1,num2,num3) {
            if (num1>=num2&&num1>=num3) {
                return num1;
            }
            else if(num2>=num1&&num2>=num3) {
                return num2;
            }
            else {
                return num3;
            }
        }
        btn.onclick=function(){
            let n1=parseInt(document.getElementById("num1").value);
            let n2=parseInt(document.getElementById("num2").value);
            let n3=parseInt(document.getElementById("num3").value);
            let largest=largestamong3(n1,n2,n3);
            s1.textContent=largest.toString();
        }
    </script>
</body>
</html>
</html>
