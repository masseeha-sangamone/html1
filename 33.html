<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <p>Find the Total,Average and Percentage of 5 Subject marks</p>
    <button id="btn">Try it</button>
    <script>
        function calculate(m1,m2,m3,m4,m5) {

            let total=m1+m2+m3+m4+m5;
            let average=total/5;
            let percentage=(total/250)*100;

            return [total,average,percentage];
        }

        btn.onclick = function () {

            let m1 = parseInt(prompt("Enter Subject 1 marks out of 50"));
            let m2 = parseInt(prompt("Enter Subject 2 marks out of 50"));
            let m3 = parseInt(prompt("Enter Subject 3 marks out of 50"));
            let m4 = parseInt(prompt("Enter Subject 4 marks out of 50"));
            let m5 = parseInt(prompt("Enter Subject 5 marks out of 50"));

            let result = calculate(m1,m2,m3,m4,m5);
            document.write("Subject 1:"+m1+"<br>"+"Subject2:"+m2+"<br>"+"Subject 3:"+m3+"<br>"+"Subject 4:"+m4+"<br>"+"Subject 5:"+m5+"<br>");
            document.write("Total="+result[0]+"<br>");
            document.write("Average="+ result[1]+"<br>");
            document.write("Percentage="+result[2].toFixed(2)+"%");
        }
    </script>
</body>
</html>
