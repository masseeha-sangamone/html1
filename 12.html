<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="label1">Enter a number:</label>
    <input type="number" id="num1"></input><br>
    <button id="btn1">Find the factorial</button>
    <br>
    <label id="label2"></label>
    <script>
        let num=document.getElementById("num1");
        let btn1=document.getElementById("btn1");
        let l2=document.getElementById("label2");
        function fact(a)
        {
            if(a>1){
                return a*fact(a-1);
            }
            else{
                return a;
            }
        }
        btn1.onclick=function(){
            let a=parseInt(num.value);
            let result=fact(a);
            l2.innerText="Factorial is"+" "+result;
        }
        

    </script>
</body>
</html>
