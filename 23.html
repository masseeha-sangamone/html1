<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let rows = prompt("Multiplication table for how many numbers?");
let cols = prompt("Till what number should each table go?");
document.write("<center><table border='1px'>");
for (let a = 1; a <= cols; a++) {
    document.write("<tr>");
    for (let b = 1; b <= rows; b++) {
        document.write("<td style='width:40px;height:40px;text-align:center;'>"
            + (b * a) +
            "</td>");
    }
    document.write("</tr>");
}
document.write("</table></center>");
    </script>
</body>
</html>
