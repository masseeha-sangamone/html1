<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Friends list using table</h1>
    <table style="border:1px solid black ;" id="table1"></table>
    <script>
        const tab1=document.getElementById("table1");
        const list1={
            1:"Rahul",
            2:"Mariyam",
            3:"Priya",
            4:"Sara",
            5:"Arun",
            6:"Kiran",
            7:"Ananya",
            8:"Neha",
            9:"Sakshi",
            10:"David"
        };
        let keys1=Object.keys(list1);
        for(let i=0;i<keys1.length;i++){
            tab1.insertAdjacentHTML("beforeend",`
            <tr>
                <td>${keys1[i]}</td>
                <td>${list1[keys1[i]]}</td>
            </tr>
            `);
        }

    </script>
</body>
</html>
