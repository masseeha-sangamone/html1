<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<label>Enter a number</label>
<input id="n">

<button id="btn">Is it a perfect number?</button>

<p id="s"></p>

<script>
btn.onclick=function(){

    let n=parseInt(document.getElementById("n").value);

    let sum=0;

    for(let i=1;i<n;i++){
        if(n%i==0){
            sum+=i;
        }
    }

    if(sum==n){
        s.textContent="Perfect Number";
    }
    else{
        s.textContent="Not Perfect";
    }
}
</script>

</body>
</html>
