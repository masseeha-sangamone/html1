<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<button id="btn">Print a number pattern</button>

<p id="s"></p>

<script>
btn.onclick=function(){

    let result="";

    for(let i=1;i<=5;i++){

        for(let j=1;j<=i;j++){
            result+=j;
        }

        result+="<br>";
    }

    s.innerHTML=result;
}
</script>

</body>
</html>
