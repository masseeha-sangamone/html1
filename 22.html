<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series of first 20 numbers</title>
</head>
<body>
<script>
let first = 0;
let second = 1;
let next;
document.write("Fibonacci Series of first 20 numbers:<br><br>");

for (let i=1; i<=20; i++) {
    document.write(first + " ");
    next = first + second;
    first = second;
    second = next;
}
</script>
</body>
</html>
