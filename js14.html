<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication table from 1-20</title>
</head>
<body>

<script>

for (let i=1;i<=20; i++) {
    document.write("<br><b>Table of " + i + "</b><br>");
    for (let j=1;j<=10;j++) {
        document.write(i +"x"+j+"="+(i*j) + "<br>");
    }
}

</script>
</body>
</html>
