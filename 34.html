<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate simple interest</title>
</head>
<body>
    <label for="p1">Enter the Principal amount</label>
    <input type="text" id="p1">
    <br>
    <label for="r1">Enter the rate of Interest</label>
    <input type="text" id="r1">
    <br>
    <label for="t1">Enter the Time period</label>
    <input type="text" id="t1">
    <br>
    <button id="btn">Generate Simple interest</button>
    <br>
    <span id="s1"></span>
    <script>
        function simpleinterest(p,t,r) {
            return p*t*r/100;
        }
        btn.onclick=function(){
            let p=parseInt(document.getElementById("p1").value);
            let t=parseInt(document.getElementById("t1").value);
            let r=parseInt(document.getElementById("r1").value);
            let si=simpleinterest(p,t,r);
            s1.textContent=si.toString();
        }
    </script>
</body>
</html>
