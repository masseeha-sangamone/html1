<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of natural numbers</title>
</head>
<body>
<script>
let num = parseInt(prompt("Enter a number:"));
let sum = 0;
for(let i = 1; i <= num; i++) {
    sum = sum + i;
}
document.write("Sum of natural numbers from 1 to " + num + " is: " + sum);

</script>
</body>
</html>
</body>
</html>
