<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of natural numbers</title>
</head>
<body>
<script>
let sum = 0;
for(let i = 1; i <= 20; i++) {
    sum=sum + i;
}
document.write("Sum of natural numbers from 1 to 20 is"+" "+sum);
</script>
</body>
</html>
</body>
</html>
