<!DOCTYPE html>
<html>
<head>

    <title>Password Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>

        body{
            background-color: #f4f4f4;
            font-family: 'JetBrains Mono', monospace;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container{

            width: 400px;
            background-color: white;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px lightgray;

            text-align: center;
        }

        h1{
            margin-bottom: 20px;
        }

        input{

            width: 90%;

            padding: 10px;

            margin-top: 10px;
            margin-bottom: 15px;

            font-size: 16px;

            font-family: 'JetBrains Mono', monospace;
        }

        button{

            padding: 12px 20px;

            font-size: 16px;

            border: none;

            background-color: black;
            color: white;

            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{
            opacity: 0.8;
        }

        ol{
            text-align: left;
            margin-top: 25px;
        }

        li{

            background-color: #eeeeee;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Password Generator</h1>

        <input type="number" id="count" placeholder="Enter number of passwords">

        <input type="number" id="length" placeholder="Enter password length">

        <br>

        <button onclick="generatePasswords()">
            Generate
        </button>

        <ol id="passwordList"></ol>

    </div>

    <script>

        let smallLetters = "abcdefghijklmnopqrstuvwxyz".split("");

        let capitalLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        let numbers = "0123456789".split("");

        let allCharacters = [

            ...smallLetters,

            ...capitalLetters,

            ...numbers

        ];

        function generatePasswords(){

            let count =
                document.getElementById("count").value;

            let length =
                document.getElementById("length").value;

            let passwordList =
                document.getElementById("passwordList");

            passwordList.innerHTML = "";

            for(let i = 0; i < count; i++){

                let password = "";

                for(let j = 0; j < length; j++){

                    let randomIndex =
                        Math.floor(
                            Math.random() * allCharacters.length
                        );

                    password +=
                        allCharacters[randomIndex];
                }

                let li =
                    document.createElement("li");

                li.innerText = password;

                passwordList.appendChild(li);
            }

        }

    </script>

</body>
</html>
