<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>    
<script>
let num=Number(prompt("Enter a number to check if it is an armstrong number."));
let temp = num;
let count = 0;
let sum = 0;
while(temp > 0){
    count++;
    temp = Math.floor(temp / 10);
    }
temp = num;
while(temp > 0){
    let digit = temp % 10;
    let power = 1;
    for(let i = 1; i <= count; i++){
        power *= digit;
    }
    sum += power;
    temp = Math.floor(temp / 10);
    }
if(sum === num){
    alert("It is an armstrong number!");
    }
else{
    alert("It is not an armstrong number");
    }
</script>
</body>
</html>
