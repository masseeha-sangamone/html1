<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>

    <style>

        :root{
            --color1:#d18b47;
            --color2:#ffcd9e;
        }

        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        table{
            border-collapse: collapse;
        }

        td{
            width: 70px;
            height: 70px;
            text-align: center;
            font-size: 45px;
            font-weight: bold;
        }

        .color1{
            background-color: var(--color1);
        }

        .color2{
            background-color: var(--color2);
        }

        button{
            margin: 10px;
            padding: 10px 20px;
            font-size: 18px;
        }

    </style>
</head>

<body>

    <table id="board">

        <!-- Row 1 -->
        <tr>
            <td class="color1">&#9820;</td>
            <td class="color2">&#9822;</td>
            <td class="color1">&#9821;</td>
            <td class="color2">&#9819;</td>
            <td class="color1">&#9818;</td>
            <td class="color2">&#9821;</td>
            <td class="color1">&#9822;</td>
            <td class="color2">&#9820;</td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td class="color2">&#9823;</td>
            <td class="color1">&#9823;</td>
            <td class="color2">&#9823;</td>
            <td class="color1">&#9823;</td>
            <td class="color2">&#9823;</td>
            <td class="color1">&#9823;</td>
            <td class="color2">&#9823;</td>
            <td class="color1">&#9823;</td>
        </tr>

        <!-- Row 3 -->
        <tr>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
        </tr>

        <!-- Row 4 -->
        <tr>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
        </tr>

        <!-- Row 5 -->
        <tr>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
        </tr>

        <!-- Row 6 -->
        <tr>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
            <td class="color2">.</td>
            <td class="color1">.</td>
        </tr>

        <!-- Row 7 -->
        <tr>
            <td class="color1">&#9817;</td>
            <td class="color2">&#9817;</td>
            <td class="color1">&#9817;</td>
            <td class="color2">&#9817;</td>
            <td class="color1">&#9817;</td>
            <td class="color2">&#9817;</td>
            <td class="color1">&#9817;</td>
            <td class="color2">&#9817;</td>
        </tr>

        <!-- Row 8 -->
        <tr>
            <td class="color2">&#9814;</td>
            <td class="color1">&#9816;</td>
            <td class="color2">&#9815;</td>
            <td class="color1">&#9813;</td>
            <td class="color2">&#9812;</td>
            <td class="color1">&#9815;</td>
            <td class="color2">&#9816;</td>
            <td class="color1">&#9814;</td>
        </tr>

    </table>

    <div>
        <button onclick="previousMove()">Previous</button>
        <button onclick="nextMove()">Next</button>
    </div>

    <script>

        let board = document.getElementById("board");

        let moves = [

            function(){

                board.rows[6].cells[4].innerHTML=".";
                board.rows[4].cells[4].innerHTML="&#9817;";

            },

            function(){

                board.rows[1].cells[4].innerHTML=".";
                board.rows[3].cells[4].innerHTML="&#9823;";

            }

        ];

        let currentMove = -1;

        function nextMove(){

            if(currentMove < moves.length-1){

                currentMove++;
                moves[currentMove]();

            }

        }

        function previousMove(){

            location.reload();

        }

    </script>

</body>
</html>
